name: CI

on:
  push:
    branches: [master, main]
  pull_request:

jobs:
  test-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
      - name: install audio cgo deps
        run: sudo apt-get update && sudo apt-get install -y libopus-dev libopusfile-dev pkg-config
      - name: go vet
        run: go vet ./...
      - name: go test
        run: go test ./...
      - name: go test -race (selected packages)
        run: go test -race ./internal/discovery/... ./internal/call/... ./internal/ipc/... ./internal/app/... ./internal/cli/... ./internal/transport/p2p/... ./internal/audio/...

  test-macos:
    runs-on: macos-latest
    # Force a short TMPDIR. macOS's default ($TMPDIR =
    # /var/folders/<hash>/T/) makes t.TempDir() produce paths >100 chars,
    # which exceeds Unix socket sun_path's 104-byte limit when a test
    # appends a socket filename. /tmp keeps test paths short enough.
    env:
      TMPDIR: /tmp
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
      - name: install audio cgo deps
        run: brew install opus opusfile pkg-config
      - name: go vet
        run: go vet ./...
      - name: go test
        run: go test ./...

  test-windows:
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    env:
      # mingw-w64-x86_64-go uses gcc; cgo silently turns off if no C compiler
      # is found, which makes opus.v2's Stream type "undefined".
      CGO_ENABLED: "1"
    steps:
      - uses: actions/checkout@v6
      - uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-opus
            mingw-w64-x86_64-opusfile
            mingw-w64-x86_64-pkgconf
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-go
      - name: go vet
        run: go vet ./...
      - name: go test
        run: go test ./...
